name: Dependabot Automatic Merge

on:
  workflow_call:
    inputs:
      merge-type:
        type: string
        description: 'The type of merge to perform (e.g., "squash", "rebase", "merge").'
        required: false
        default: 'merge'

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  dependabot-tidy:
    # Run only on PRs opened by dependabot
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the PR branch directly to allow pushing back changes
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:

          go-version-file: 'go.work' # Scales dynamically with workspace toolchain
          cache: true

      - name: Sync and Tidy Workspace
        run: |
          # Sync go.work hashes and tidy sub-modules
          go work sync

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only stage changes to workspace-related files
          git add go.work go.work.sum
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync go.work following dependabot updates"
            git push
          else
            echo "No workspace synchronization needed."
          fi

  dependabot:
    name: "Automatic merge for non-major semver changes"
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for Dependabot PRs (${{ steps.metadata.outputs.update-type }})
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_TYPE: ${{ inputs.merge-type }}
        run: |
          case "${MERGE_TYPE}" in
            "squash")
              MERGE_OPT="--squash"
              ;;
            "rebase")
              MERGE_OPT="--rebase"
              ;;
            "merge")
              MERGE_OPT="--merge"
              ;;
            *)
              echo "Invalid merge type: ${MERGE_TYPE}. Defaulting to 'merge'."
              MERGE_OPT="--merge"
              ;;
          esac
          gh pr merge --auto "${MERGE_OPT}" "${PR_URL}"
